<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise CloudPOS Kiosk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { user-select: none; -webkit-user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media print {
            body * { visibility: hidden; }
            #receipt-print-area, #receipt-print-area * { visibility: visible; }
            #receipt-print-area { position: absolute; left: 0; top: 0; width: 80mm; }
        }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden">

<div id="app" class="flex flex-col lg:flex-row h-full w-full overflow-y-auto lg:overflow-hidden">

    <div class="w-full lg:w-2/3 h-auto lg:h-full flex flex-col p-4 bg-gray-50">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
            <h1 class="text-2xl font-black text-gray-800 tracking-wide">
                <i class="fa-solid px-2 fa-shop text-blue-600"></i>Self-Serve Kiosk
            </h1>
            <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                <button @click="activeCategory = 'All'" :class="activeCategory === 'All' ? 'bg-blue-600 text-white' : 'bg-white text-gray-700 border'" class="flex-1 sm:flex-none px-3 py-2 rounded-xl text-sm font-bold shadow-sm">All Items</button>
                <button v-for="cat in categories" @click="activeCategory = cat" :class="activeCategory === cat ? 'bg-blue-600 text-white' : 'bg-white text-gray-700 border'" class="flex-1 sm:flex-none px-3 py-2 rounded-xl text-sm font-bold shadow-sm">{{ cat }}</button>
                
                <button @click="openReportsDashboard" class="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded-xl text-sm font-bold flex items-center gap-1.5 shadow-sm ml-auto sm:ml-0">
                    <i class="fa-solid fa-chart-line"></i> Analytics Dashboard
                </button>
                <button @click="showAdmin = !showAdmin" class="text-gray-400 hover:text-gray-600 p-2"><i class="fa-solid fa-gear text-xl"></i></button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 pb-4 no-scrollbar">
            <div v-for="product in filteredProducts" :key="product.id" @click="addToCart(product)" class="bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between overflow-hidden cursor-pointer active:scale-95 transform transition hover:shadow-md">
                <div class="w-full h-36 bg-gray-200 relative">
                    <img :src="product.image" :alt="product.name" class="w-full h-full object-cover">
                </div>
                <div class="p-4 flex-1 flex flex-col justify-between">
                    <div>
                        <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400 bg-gray-100 px-2 py-0.5 rounded">{{ product.category }}</span>
                        <h3 class="text-base font-bold text-gray-800 line-clamp-2 mt-1">{{ product.name }}</h3>
                    </div>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-lg font-black text-blue-600">${{ product.price.toFixed(2) }}</span>
                        <span class="bg-blue-50 text-blue-600 text-xs px-2.5 py-1 rounded-full font-
